name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  go-ci:
    name: Go Vet + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history + tags are required by
          # scripts/testdata/gen_prev_release_db.sh, which walks
          # `git describe --tags --match 'v*'` from HEAD to find the
          # previous release fixture source.
          fetch-depth: 0

      - name: Install ALSA dev headers + jq
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev jq

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      # Node is needed for the generated OpenAPI TypeScript client drift
      # guard (`make api-client-check`). Version tracks the local
      # developer setup; bump when the web/ toolchain bumps.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      # swag is a dev-time CLI only; install it into the repo-local
      # scratch/bin (the same location the Makefile's SWAG variable
      # points at) so `make docs-check` / `make docs-lint` can find it
      # without polluting $GOBIN or the runner's PATH.
      - name: Install swag CLI
        run: |
          mkdir -p scratch/bin
          GOBIN="$(pwd)/scratch/bin" go install github.com/swaggo/swag/cmd/swag@v1.16.4

      - name: OpenAPI spec drift guard (make docs-check)
        run: make docs-check

      - name: OpenAPI @ID linter (make docs-lint)
        run: make docs-lint

      - name: OpenAPI TypeScript client drift guard (make api-client-check)
        run: make api-client-check

      - name: go vet
        run: go vet ./...

      # Regenerate the prior-release migration fixture so
      # TestMigrateFromPriorRelease has real coverage on every run.
      # Non-fatal: if the generator fails (e.g. previous release has a
      # build break on current CI toolchain), the test skip path keeps
      # CI green. Log the failure so we notice.
      - name: Generate prior-release migration fixture
        run: |
          if ! ./scripts/testdata/gen_prev_release_db.sh; then
            echo "::warning::gen_prev_release_db.sh failed; TestMigrateFromPriorRelease will skip"
          fi

      - name: go test -race
        run: go test -race ./...

  rust-ci:
    name: Rust Check + Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
