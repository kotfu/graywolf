<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <title>graywolf</title>
    <link rel="stylesheet" href="/fonts/saucecodepro-nerd/saucecodepro-nerd-font.css" />
    <link rel="stylesheet" href="/fonts/inconsolata/inconsolata.css" />
    <script>
      // Apply the stored theme before any CSS paints so the first
      // frame is rendered with the right palette. The regex matches
      // configstore.IsValidTheme (^[a-z0-9-]{1,64}$); we deliberately
      // don't list the shipped ids here so adding/removing a theme
      // never requires touching this file.
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var ok = typeof stored === 'string' && /^[a-z0-9][a-z0-9-]{0,63}$/.test(stored);
          document.documentElement.setAttribute('data-theme', ok ? stored : 'graywolf');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'graywolf');
        }
      })();
    </script>
    <script>
      // Apply the stored UI scale before the first frame paints so the
      // interface doesn't visibly jump from 100% to the operator's chosen
      // size on load. Mirrors ui-scale-store.svelte.js; accepts the same
      // [0.9, 2] range. The store snaps to discrete steps after mount, so a
      // raw in-range value here is fine. Default (1) is a no-op, so we leave
      // `zoom` unset.
      (function () {
        try {
          var n = parseFloat(localStorage.getItem('ui-scale'));
          if (isFinite(n) && n >= 0.9 && n <= 2 && n !== 1) {
            document.documentElement.style.zoom = String(n);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
